# ==================== ds-web 管理界面 ====================
# 提供 Web 管理面板，支持通过浏览器备份/还原/部署 docker-stacks 应用
services:
  ds-web:
    build:
      context: ../..              # /srv/docker-stacks（项目根目录）
      dockerfile: service/docker/Dockerfile
    image: ds-web:latest
    container_name: ds-web
    restart: unless-stopped

    # 以 root 运行：entry.sh 需要 root 权限操作容器数据文件（chmod/chown 等）
    user: "0:0"

    # 端口映射：宿主机 3001 → 容器 3001
    ports:
      - "3001:3001"

    # 工作目录：后端入口所在目录
    working_dir: /srv/docker-stacks/service/web/server

    volumes:
      # 挂载整个 docker-stacks 仓库（引擎脚本、应用栈、备份目录）
      # 源路径用相对路径（相对于 compose 文件所在目录），适配任意 clone 位置
      - ../..:/srv/docker-stacks

      # Docker socket：deploy 命令需要执行 docker compose
      - /var/run/docker.sock:/var/run/docker.sock

      # 容器内 node_modules 独立存储（使用镜像构建产物，不污染宿主机）
      - ds-web-node-modules:/srv/docker-stacks/service/web/server/node_modules

    # 环境变量：web 服务自身的配置
    #   - 认证凭据（WEB_USER/WEB_PASS）：填值启用 HTTP Basic Auth，留空不启用
    #   - WebDAV 配置不再通过 env_file 注入，改由 settings.json 管理
    environment:
      PORT: "3001"
      HOST: "0.0.0.0"
      HOME: "/root"
      # WEB_USER:
      # WEB_PASS:

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:3001/api/auth/status"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

volumes:
  # 命名卷：持久化 node_modules（首次从镜像复制，之后复用）
  ds-web-node-modules:
