# ==================== OpenClaw AI 代理网关 ====================
# 官方 Docker 文档: https://docs.openclaw.ai/install/docker
services:
  openclaw:
    # ghcr.1ms.run 为 ghcr.io 国内镜像，与项目其他栈保持一致
    image: ghcr.1ms.run/openclaw/openclaw:latest-browser
    container_name: openclaw
    init: true
    restart: unless-stopped
    user: "${NAS_PUID}:${NAS_PGID}"

    # 网关 / 控制 UI / 桥接 / MS Teams 端口
    ports:
      - "18789:18789"   # 控制 UI / 网关
      - "18790:18790"   # bridge 本地桥接通道
      - "3978:3978"     # MS Teams 通道

    # 容器内通过 host.docker.internal 访问宿主机服务（Ollama / LM Studio / Mihomo 代理等）
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # 安全加固：丢弃不需要的能力，禁止提权
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true

    # 仅注入网关令牌（data/config/.env，已 gitignore）；不含宿主机路径，不触发 #77436 泄漏
    env_file:
      - ./data/config/.env

    environment:
      # 固定容器内路径，避免宿主 .env 中的宿主机路径泄漏进容器运行时（官方 #77436）
      HOME: /home/node
      OPENCLAW_HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      TZ: ${TZ}
      # 网关监听范围: lan = 局域网可访问（适合 NAS 部署，宿主机浏览器可打开 UI）
      OPENCLAW_GATEWAY_BIND: lan
      # 容器内访问宿主代理（Mihomo mixed-port），bridge 模式通过 host.docker.internal
      HTTP_PROXY: ${PROXY_BRIDGE}
      HTTPS_PROXY: ${PROXY_BRIDGE}
      NO_PROXY: ${NO_PROXY}

    volumes:
      # 配置目录（openclaw.json / .env 网关令牌 / agents/ 认证信息）
      - ./data/config:/home/node/.openclaw
      # 鉴权密钥目录（与配置分离保存）
      - ./data/auth:/home/node/.config/openclaw
      # 让代理能访问并管理 NAS 媒体库与下载目录（按需调整权限）
      - ${MEDIA_ROOT}:/media
      - ${DOWNLOAD_ROOT}:/downloads

    # 显式启动网关（与官方 compose 一致）
    command:
      - "node"
      - "dist/index.js"
      - "gateway"
      - "--bind"
      - "lan"
      - "--port"
      - "18789"

    healthcheck:
      # 镜像基于 node:24-slim，无 curl/wget，改用 node fetch 探测 /healthz
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 5
