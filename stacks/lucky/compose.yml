# ==================== Lucky 网络管理 ====================
services:
  lucky:
    image: gdy666/lucky:v3
    container_name: lucky
    restart: unless-stopped
    user: "${NAS_PUID}:${NAS_PGID}"

    # host 模式由 Lucky 自身管理端口监听
    network_mode: host

    # 允许非 root 用户绑定特权端口（如 SMB 445）
    cap_add:
      - NET_BIND_SERVICE

    # 让容器进程获得宿主 docker 组权限以访问 docker.sock
    group_add:
      - "989"   # docker 组 GID

    volumes:
      - ./data/conf:/app/conf              # 持久化配置
      - /var/run/docker.sock:/var/run/docker.sock  # 管理容器/获取证书等
      - ${DATA_ROOT}:/mnt/data:rw          # 数据盘（SMB/filebrowser/DLNA）
