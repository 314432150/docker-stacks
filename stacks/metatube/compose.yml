# ==================== MetaTube 元数据刮削 ====================
services:
  metatube-server:
    image: ghcr.1ms.run/metatube-community/metatube-server:latest
    container_name: metatube
    restart: unless-stopped
    user: "${NAS_PUID}:${NAS_PGID}"

    ports:
      - "8081:8080"  # 宿主机 8081，避免与 metacubexd 的 8080 冲突

    extra_hosts:
      - "host.docker.internal:host-gateway"          # bridge 容器访问宿主机代理

    volumes:
      - ./data/config:/config  # 数据库文件 metatube.db

    environment:
      HTTP_PROXY: ${PROXY_BRIDGE}   # 刮削 TMDB 等需要代理
      HTTPS_PROXY: ${PROXY_BRIDGE}
      NO_PROXY: ${NO_PROXY}
      TZ: ${TZ}

    command: -dsn /config/metatube.db -db-auto-migrate -db-prepared-stmt

    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
