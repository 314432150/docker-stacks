# ==================== Portainer 容器管理 ====================
services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    user: "${NAS_PUID}:${NAS_PGID}"
    ports:
      - "9443:9443"
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
    environment:
      TZ: ${TZ}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
