# ==================== Dockge 可视化管理 ====================
services:
  dockge:
    image: louislam/dockge:nightly
    container_name: dockge
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - ../stacks:/opt/stacks
      - ../.env:/opt/.env
    environment:
      DOCKGE_STACKS_DIR: /opt/stacks
      TZ: ${TZ}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
